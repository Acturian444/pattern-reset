<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background: #050505;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 64px;
      font-family: 'DM Sans', sans-serif;
      text-align: center;
    }
    .brand-text {
      font-family: 'Anton', sans-serif;
      font-size: 112px;
      font-weight: 400;
      color: #f10000;
      letter-spacing: 0.04em;
      line-height: 1;
      margin-bottom: 28px;
      text-transform: uppercase;
    }
    .headline-text {
      font-family: 'DM Sans', sans-serif;
      font-size: 36px;
      font-weight: 400;
      color: #ffffff;
      line-height: 1.35;
      max-width: 920px;
    }
  </style>
</head>
<body>
  <div class="brand-text">Let It Out</div>
  <div class="headline-text">Tell the story you&rsquo;ve never told.</div>
</body>
</html>
