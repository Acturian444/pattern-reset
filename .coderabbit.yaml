# CodeRabbit config: enable PR reviews for this repo.
# See https://docs.coderabbit.ai/getting-started/yaml-configuration
language: "en-US"
reviews:
  profile: "chill"
  auto_review:
    enabled: true
  high_level_summary: true
  # Stay under CodeRabbit’s ~150-file PR limit (counts paths still in the diff). These dirs/files are
  # reference, backups, or internal notes—not runtime app logic. Excluding only affects the bot, not Vercel/builds.
  path_filters:
    - "!backup/**"
    - "!docs/**"
    - "!Alex Hormozi Mastermind/**"
    - "!EXPERT_ROUNDTABLE.md"
    - "!QUIZ_EXPERT_ANALYSIS.md"
