# CodeRabbit config: enable PR reviews for this repo.
# See https://docs.coderabbit.ai/getting-started/yaml-configuration
language: "en-US"
reviews:
  profile: "chill"
  auto_review:
    enabled: true
  high_level_summary: true
  # PR #5 hit CodeRabbit’s 150-file cap (151 after default ignores). Exclude snapshot backup from review scope.
  path_filters:
    - "!backup/**"
